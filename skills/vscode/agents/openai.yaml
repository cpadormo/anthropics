interface:
  display_name: "VS Code"
  short_description: "VS Code-family config for Cursor, Trae, Qoder, CodeBuddy"
  default_prompt: "Use $vscode to configure and operate VS Code-family IDEs such as VS Code, VS Code Insiders, Cursor, VSCodium, Trae, Qoder, and CodeBuddy. The default entry point is the cross-platform Python gateway at scripts/vscode_skill.py; on Windows it forwards to the PowerShell driver vscode-cli.ps1, on macOS and Linux it implements core areas natively in Python. Prefer the product CLI and structured JSON config files over ad-hoc edits. Resolve the target CLI and user data paths through environment variables (VSCODE_CODE_CLI, VSCODE_INSIDERS_CLI, VSCODE_SKILL_CONFIG, VSCODE_SKILL_TEMP) and the config file before falling back to platform defaults. For Cursor, VSCodium, Trae, Qoder, and CodeBuddy, use products.<slug>.cliPath, userDataPath, and extensionsPath unless the product is explicitly supported by local auto-detection. Limit Qoder and CodeBuddy work to their VS Code-compatible settings, .vscode files, extensions, keybindings, snippets, profiles, tasks/launch templates, and Remote-style workflows; do not claim support for proprietary AI chat, accounts, models, agents, marketplaces, or internal state. Classify every write as read-only inspection, project configuration, or user/global configuration; for user/global writes state the product, file, key, old value when readable, new value, and rollback path before applying --Apply. Never enable or disable Settings Sync programmatically."
